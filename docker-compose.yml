version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gaia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gaia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gaia_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-gaia}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gaia}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gaia-net

  mongo:
    image: mongo:7
    container_name: gaia-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gaia-net

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: gaia-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - gaia-net

  redis:
    image: redis:7-alpine
    container_name: gaia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gaia-net

  backend:
    build: ./backend
    container_name: gaia-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - gaia-net

  worker:
    build: ./backend
    container_name: gaia-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres
      - mongo
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    networks:
      - gaia-net

  whatsapp-bridge:
    build: ./whatsapp-bridge
    container_name: gaia-whatsapp-bridge
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    volumes:
      - wa_sessions:/app/.wwebjs_auth
      - wa_cache:/app/.wwebjs_cache
    networks:
      - gaia-net

  frontend:
    build: ./frontend
    container_name: gaia-frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - gaia-net

volumes:
  postgres_data:
  mongo_data:
  qdrant_data:
  redis_data:
  wa_sessions:
  wa_cache:

networks:
  gaia-net:
    driver: bridge
